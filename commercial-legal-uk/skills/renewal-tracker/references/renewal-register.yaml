#   renewal_mechanism: "auto-renew annual"
#   notice_period_days: 60
#   notice_method: "email"           # email / portal / written notice / registered post / per contract §X
#   transit_buffer_days: 0           # 0 for email, 2 for first-class post, 5 for registered post
#   governing_law: "English law"     # English law / Scots law / NI law / other
#   cancel_by_calendar: 2026-04-16   # current_term_end minus notice_period_days (raw arithmetic)
#   cancel_by_effective: 2026-04-16  # rolled back to last UK business day (E&W bank holidays)
#   send_by_effective: 2026-04-16    # cancel_by_effective minus transit_buffer_days — date to SEND the notice
